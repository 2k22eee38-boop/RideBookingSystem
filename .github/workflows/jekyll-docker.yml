name: Ride Booking Full Stack CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  backend:
    name: Ride Backend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build Backend
        working-directory: ./backend/ride
        run: |
          chmod +x mvnw
          ./mvnw clean install -DskipTests

      - name: Build Docker Image
        working-directory: ./backend/ride
        run: docker build -t ride-backend -f .dockerfile .

  frontend:
    name: Ride Frontend Build
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: ./frontend/rap/package-lock.json

      - name: Configure npm
        working-directory: ./frontend/rap
        run: |
          npm config set registry https://registry.npmjs.org/
          npm config set fetch-retries 5
          npm config set fetch-retry-maxtimeout 600000
          npm config set fetch-retry-mintimeout 20000

      - name: Install Dependencies
        working-directory: ./frontend/rap
        run: |
          for i in 1 2 3; do
            npm install --no-audit --no-fund && break || sleep 10
          done

      - name: Build Frontend
        working-directory: ./frontend/rap
        run: npm run build
